/* ══════════════════════════════════════════════════════════════
   SANIA-STYLE SECTION-BASED STICKY GALLERY

   STRUCTURE:
   • The gallery is a list of SECTIONS (.g-section).
   • Each section holds 1–6 images that STACK on scroll.
   • Within a section, each image is position:sticky with its own
     top offset + z-index, so as you scroll they pile up near the top.
   • The section itself has extra height (padding-bottom), which is
     the "scroll runway" for the stack. When the section ends, the
     NEXT section scrolls up and pushes the whole stack away —
     so you never get an endless pile, just 1–6 per section.
   • A section with a single image = a calm, no-stack moment.

   All computed from the GALLERY data — you never touch CSS.
   ══════════════════════════════════════════════════════════════ */
.s-work{position:relative;width:100%;z-index:1;overflow-x:clip}

@media(min-width:1025px){
  #gallery-root{
    padding-left:clamp(50px, calc(-73.5px + 12.05vw), 100px);
    padding-right:clamp(50px, calc(-73.5px + 12.05vw), 100px);
  }
}

.g-section{
  position:relative;
  display:grid;
  grid-template-columns:repeat(9,1fr);
  gap:0.9rem;
  max-width:1600px;
  margin:0 auto;
  padding:0 0.9rem;
  /* padding-bottom is set inline per section = the stack's scroll runway */
}

.g-item{
  position:sticky;
  border-radius:4px;
  /* top, grid-column, grid-row, margin-top, z-index set inline */
}

.g-ph{
  width:100%;
  display:flex;align-items:center;justify-content:center;
  font-family:monospace;font-size:11px;font-weight:600;letter-spacing:.06em;
  color:rgba(0,0,0,0.28);border-radius:4px;aspect-ratio:4/3;
}
.g-item img{
  display:block;width:100%;height:auto;border-radius:4px;cursor:zoom-in;
}
.g-item.loaded .g-ph{display:none}

/* ══════════════════════════════════════════════════════════════
   RESPONSIVE — reverse-engineered from Sania's own CSS (≤767px):
   • Sections KEEP their grid structure (not collapsed to 1 column).
   • Each section simplifies to a narrow grid.
   • CRUCIALLY: every image gets top:0 (instead of the desktop's
     negative/varied offsets) but STAYS position:sticky — so all
     images pin at the same top line and each one covers the
     previous as you scroll. That's how the stack survives on mobile.
   • z-index is preserved (higher = later = covers earlier).
   ══════════════════════════════════════════════════════════════ */
@media(max-width:767px){
  .g-section{
    grid-template-columns:1fr 1fr;   /* two narrow columns, like Sania */
    gap:0.5rem;
    padding:0 0 8px !important;     /* small runway between sections */
  }
  /* Every image: sticky STAYS, but pin all to top:0 so they stack.
     Full width within their column; keep natural proportions. */
  .g-item,
  .g-item[data-size]{
    position:sticky !important;
    top:0 !important;
    margin-top:0 !important;
    background:var(--bg);            /* opaque cover */
  }
  /* size → how many of the 2 columns the image spans */
  .g-item[data-size="xl"]     { grid-column:span 2 !important; }
  .g-item[data-size="large"]  { grid-column:span 2 !important; }
  .g-item[data-size="medium"] { grid-column:span 1 !important; }
  .g-item[data-size="small"]  { grid-column:span 1 !important; }
  .g-item[data-size="mini"]   { grid-column:span 1 !important; }
  .g-item[data-size="tiny"]   { grid-column:span 1 !important; }
  .g-item img{ border-radius:4px; }
}

/* ── PHONE (≤479px) — single column, still stacking ─────────── */
@media(max-width:479px){
  .g-section{
    grid-template-columns:1fr;       /* one column on small phones */
    gap:0.5rem;
    padding:0 0 8px !important;
  }
  .g-item,
  .g-item[data-size]{
    grid-column:1 / -1 !important;   /* full width */
    position:sticky !important;
    top:0 !important;
    margin-top:0 !important;
    background:var(--bg);
  }
  .g-item[data-file="02-collage-me"] {
    order: 1;
    z-index: 1 !important;
  }
  .g-item[data-file="01-butterfly-alis-illustration"] {

  .g-item[data-file="03-miluim-shenkar"] {

}

<script>
// ═══════════════════════════════════════════════════════════════════════
//  GALLERY MANIFEST  —  the ONLY thing you edit
// ═══════════════════════════════════════════════════════════════════════
//
//  The gallery is a list of SECTIONS. Each section is a group of
//  1–6 images that STACK on top of each other as you scroll.
//  When a section ends, the next one pushes the stack up and away —
//  so you never get an endless pile, just a few images per group.
//
//  A section with ONE image = a calm, single-image moment (no stacking).
//
//  ── HOW TO EDIT ──────────────────────────────────────────────
//
//  Each image row:  { file, size, col }
//    file  → the filename WITHOUT extension, e.g. '01-butterfly'
//            (extension .jpg/.png/.gif is auto-detected)
//            You can also use { n:1 } as shorthand for 'GALLERY-01'.
//    size  → 'xl' | 'large' | 'medium' | 'small' | 'mini' | 'tiny'
//    col   → 'left' | 'center' | 'right'
//
//  • First TWO images in a section sit side-by-side at the top.
//  • From the 3rd image, they stack on scroll (Sania effect).
//  • Reorder inside a section → move rows up/down within its array
//  • Move image to another section → cut/paste its row
//  • Add a section → add a new [ ... ] array to SECTIONS
//  • Remove a section → delete its array
//  • Hide one image → delete its row
//  • Resize → change size value
//  • Add image → { file:'16-newname', size:'medium', col:'left' }
//               + upload 16-newname.jpg to the folder
//
// ═══════════════════════════════════════════════════════════════════════

const SECTIONS = [
  [
    { file:'01-butterfly-alis-illustration', size:'medium', col:'left'  },
    { file:'02-collage-me',                  size:'small',  col:'right' },
    { file:'03-miluim-shenkar',              size:'small',  col:'right' },
    { file:'04-left-hand-drawing',           size:'medium', col:'left'  },
  ],
  [
    { file:'05-luna-colorful-illustration',  size:'medium', col:'right' },
    { file:'06-logotype-abarbanel',          size:'medium', col:'left'  },
    { file:'07-logo-choclate', size:'small', col:'right',
      override: {
        gridColumn: '6 / span 4',
        top:        '100px',
        marginTop:  '600px',
        zIndex:     '3',
      }
    },
    { file:'08-me-frame-by-frame',           size:'small',  col:'left'  },
  ],
  [
    { file:'09-bombing-area-illustration',  size:'large', col:'right' },
    { file:'10-luna-colorful-window',       size:'large', col:'left'  },
  ],
  [
    { file:'11-me-illustration',             size:'large',  col:'center'},
    { file:'13-goddess', size:'medium', col:'center',
      override: {
        gridColumn:   '3 / span 6',
        marginBottom: '1000px',
      }
    },
  ],
  [
    { file:'12-red-hair-girl-illustration',  size:'medium', col:'left'  },

      override: {

    { file:'17-luna-ai',                     size:'medium', col:'left'  },

];

// ── Size → column span (out of 9) ──────────────────────────────────────
const SPAN = { xl:9, large:6, medium:5, small:4, mini:3, tiny:2 };

// ── Placeholder palette ────────────────────────────────────────────────
const PH_COLORS = ['#E0DBD0','#D8D4C8','#E5E1D5','#CCCAB8','#D5D1C5','#E2DED2'];

// ── Extension auto-detect ───────────────────────────────────────────────
// Filenames use the format:  NN-name.ext   (e.g. 01-butterfly.jpg)
// You provide the base name (without extension) via the `file` field,
// OR just the number `n` and it falls back to GALLERY-NN.
const EXTS = ['jpg','JPG','jpeg','png','PNG','gif','GIF','webp'];
const IMG_BASE = '/portfolio images/logos-art-for-fun/';
function resolveImg(img, baseName, onDone){
  let i = 0;
  (function next(){
    if (i >= EXTS.length){ if(onDone) onDone(false); return; }
    const probe = new Image();
    probe.onload  = () => { img.src = probe.src; if(onDone) onDone(true); };
    probe.onerror = next;
    probe.src = IMG_BASE + baseName + '.' + EXTS[i++];
  })();
}

// ── Build ────────────────────────────────────────────────────────────────
function buildGallery(){
  const root = document.getElementById('gallery-root');
  if (!root) return;
  root.innerHTML = '';
  const allImgs = [];
  let phColorIdx = 0;

  SECTIONS.forEach((items, secIdx) => {
    const section = document.createElement('div');
    section.className = 'g-section';
    section.id = 's' + (secIdx + 1);

    const count = items.length;
    const runway = count <= 1 ? 2 : 2 + count * 1.1;   // rem — scroll runway per stack
    section.style.paddingBottom = runway + 'rem';
    section.style.zIndex = String(secIdx + 1);

    items.forEach((item, i) => {
      const span = SPAN[item.size] || 5;
      // baseName: use `file` if provided (e.g. '01-butterfly'),
      // otherwise fall back to GALLERY-NN
      const baseName = item.file
        ? item.file
        : 'GALLERY-' + String(item.n).padStart(2,'0');
      const label = baseName;

      // ── horizontal placement ──
      let colStart;
      if (item.col === 'left')        colStart = 1;
      else if (item.col === 'right')  colStart = 9 - span + 1;
      else                            colStart = Math.round((9 - span)/2) + 1;
      if (colStart < 1) colStart = 1;

      // ── vertical stacking ──
      // First TWO images in a section sit side-by-side at the TOP
      // (no downward stagger) — like Sania's opening pair.
      // From the 3rd image onward, they stack with increasing offset.
      let topOffset, marginTop;
      if (i < 2){
        topOffset = 30;          // both pinned near the top, same line
        marginTop = 0;
      } else {
        topOffset = 30 + (i - 1) * 30;
        marginTop = (i % 2 === 0 ? 4 : 7);  // rem stagger
      }

      const el = document.createElement('div');
      el.className = 'g-item';
      el.dataset.size     = item.size || 'medium';
      el.dataset.col      = item.col  || 'left';
      el.dataset.file     = item.file;
      el.style.gridColumn = `${colStart} / span ${span}`;
      el.style.top        = topOffset + 'px';
      el.style.marginTop  = marginTop + 'rem';
      el.style.zIndex     = String(i + 1);

      if (item.override && window.innerWidth > 676) {
        const ov = item.override;
        if (ov.gridColumn) el.style.gridColumn = ov.gridColumn;
        if (ov.top)        el.style.top        = ov.top;
        if (ov.marginTop)  el.style.marginTop  = ov.marginTop;
        if (ov.marginBottom) el.style.marginBottom = ov.marginBottom;
        if (ov.zIndex)     el.style.zIndex     = ov.zIndex;
      }

      const ph = document.createElement('div');
      ph.className = 'g-ph';
      ph.style.background = PH_COLORS[phColorIdx++ % PH_COLORS.length];
      ph.textContent = label;
      el.appendChild(ph);

      const img = document.createElement('img');
      img.alt = label.replace(/[-_]/g,' ');
      img.loading  = i < 2 && secIdx === 0 ? 'eager' : 'lazy';
      img.decoding = 'async';
      img.style.display = 'none';
      img.setAttribute('tabindex', '0');
      img.setAttribute('role', 'button');
      img.setAttribute('aria-label', 'Open image in full view');
      img.addEventListener('keydown', function(e){
        if(e.key==='Enter'||e.key===' '){
          e.preventDefault();
          img.click();
        }
      });
      img.addEventListener('click', () => { if(img.src) openLB(img.src, img.alt); });
      el.appendChild(img);

      section.appendChild(el);
      allImgs.push(img);

      resolveImg(img, baseName, (found) => {
        if (found){ img.style.display='block'; el.classList.add('loaded'); }
      });
    });

    root.appendChild(section);
  });

  window._galleryImgs = allImgs;
}
buildGallery();

// ═══════════════════════════════════════════════════════════════════════
//  LIGHTBOX
// ═══════════════════════════════════════════════════════════════════════
const lb=document.getElementById('lightbox');
const lbContent=document.getElementById('lbContent');
const lbCaption=document.getElementById('lbCaption');
let lbSrcs=[],lbIdx=0;
function openLB(src,alt){
  if(window.innerWidth<=560) return;
  lbSrcs=(window._galleryImgs||[]).filter(i=>i.src&&i.naturalWidth>0).map(i=>({src:i.src,alt:i.alt}));
  lbIdx=lbSrcs.findIndex(i=>i.src===src); if(lbIdx<0)lbIdx=0;
  renderLB(); lb.classList.add('open'); document.body.style.overflow='hidden';
}
function renderLB(){
  const item=lbSrcs[lbIdx]||{};
  lbContent.innerHTML=item.src?`<img src="${item.src}" alt="${item.alt||''}">`:'';
  lbCaption.textContent=item.alt||'';
  document.getElementById('lbPrev').hidden=lbSrcs.length<2;
  document.getElementById('lbNext').hidden=lbSrcs.length<2;
}
function closeLB(){lb.classList.remove('open');document.body.style.overflow='';}
function lbStep(d){lbIdx=(lbIdx+d+lbSrcs.length)%lbSrcs.length;renderLB();}
document.getElementById('lbClose').addEventListener('click',closeLB);
document.getElementById('lbPrev').addEventListener('click',e=>{e.stopPropagation();lbStep(-1);});
document.getElementById('lbNext').addEventListener('click',e=>{e.stopPropagation();lbStep(1);});
lb.addEventListener('click',e=>{if(e.target===lb)closeLB();});
document.addEventListener('keydown',e=>{
  if(!lb.classList.contains('open'))return;
  if(e.key==='Escape')closeLB();
  if(e.key==='ArrowLeft')lbStep(-1);
  if(e.key==='ArrowRight')lbStep(1);
});

// ═══════════════════════════════════════════════════════════════════════
//  ABOUT PANEL
// ═══════════════════════════════════════════════════════════════════════
function toggleAbout(e){
  if(e) e.stopPropagation();
  const panel=document.getElementById('about-panel');
  const overlay=document.getElementById('about-overlay');
  if(!panel||!overlay) return;
  if(panel.classList.contains('open')) closeAbout();
  else { panel.classList.add('open'); overlay.classList.add('open'); }
}
function closeAbout(){
  const panel=document.getElementById('about-panel');
  const overlay=document.getElementById('about-overlay');
  if(panel) panel.classList.remove('open');
  if(overlay) overlay.classList.remove('open');
}
document.addEventListener('click',function(e){
  const panel=document.getElementById('about-panel');
  if(!panel||!panel.classList.contains('open')) return;
  if(!panel.contains(e.target)){
    const btn=document.querySelector('.sb-about');
    if(!btn||!btn.contains(e.target)) closeAbout();
  }
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeAbout();});
</script>
